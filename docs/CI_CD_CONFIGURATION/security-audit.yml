name: Security Audit

on:
  push:
    branches: [ main, security/maintenance-automation ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Ejecutar todos los lunes a medianoche

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          
      - name: Run security audit
        run: pnpm audit --audit-level high
